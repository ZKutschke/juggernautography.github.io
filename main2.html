<!--   ---   Loading Page style   ---   -->
		<style>
			/* Center the loader */
			#load_page{
				width: 100vw;
				height: 100vh;
				background-color: black;
			}

			.wait{
				padding-top: 50px; 
				font-family: Bookman; 
				color: #66FCF1;
				font-size: 16px;
				font-weight: bold;
				width: 20vw;
				margin: auto;
			}

			.sk-cube-grid {
				width: 5vw;
			  	height: 5vw;
			  	margin: auto;
			}

			.sk-cube-grid .sk-cube {
			  	width: 33%;
			  	height: 33%;
			  	background-color: #66FCF1;
			  	float: left;
			  	-webkit-animation: sk-cubeGridScaleDelay 1.5s infinite ease-in-out;
			    animation: sk-cubeGridScaleDelay 1.5s infinite ease-in-out; 
			}
			.sk-cube-grid .sk-cube1 {
			  	-webkit-animation-delay: 0.2s;
			    animation-delay: 0.2s; }
			.sk-cube-grid .sk-cube2 {
			  	-webkit-animation-delay: 0.3s;
			    animation-delay: 0.3s; }
			.sk-cube-grid .sk-cube3 {
			  	-webkit-animation-delay: 0.4s;
			    animation-delay: 0.4s; }
			.sk-cube-grid .sk-cube4 {
			  	-webkit-animation-delay: 0.1s;
			    animation-delay: 0.1s; }
			.sk-cube-grid .sk-cube5 {
			  	-webkit-animation-delay: 0.2s;
			    animation-delay: 0.2s; }
			.sk-cube-grid .sk-cube6 {
			  	-webkit-animation-delay: 0.3s;
			    animation-delay: 0.3s; }
			.sk-cube-grid .sk-cube7 {
			  	-webkit-animation-delay: 0s;
			    animation-delay: 0s; }
			.sk-cube-grid .sk-cube8 {
			  	-webkit-animation-delay: 0.1s;
			    animation-delay: 0.1s; }
			.sk-cube-grid .sk-cube9 {
			  	-webkit-animation-delay: 0.2s;
			    animation-delay: 0.2s; }

			@-webkit-keyframes sk-cubeGridScaleDelay {
			  	0%, 70%, 100% {
			    	-webkit-transform: scale3D(1, 1, 1);
			            	transform: scale3D(1, 1, 1);
			  	} 35% {
			    	-webkit-transform: scale3D(0, 0, 1);
			            	transform: scale3D(0, 0, 1); 
			  	}
			}

			@keyframes sk-cubeGridScaleDelay {
			  	0%, 70%, 100% {
			    	-webkit-transform: scale3D(1, 1, 1);
			            	transform: scale3D(1, 1, 1);
			  	} 35% {
			    	-webkit-transform: scale3D(0, 0, 1);
			            	transform: scale3D(0, 0, 1);
			  	}	 
			}

			/* Add animation to "page content" */
			.animate-bottom {
				position: relative;
				-webkit-animation-name: animatebottom;
				-webkit-animation-duration: 0.5s;
				animation-name: animatebottom;
				animation-duration: 0.5s
			}

			@-webkit-keyframes animatebottom {
				from { bottom:-50px; opacity:0 } 
				to { bottom:0px; opacity:1 }
			}

			@keyframes animatebottom { 
				from{ bottom:-50px; opacity:0 } 
				to{ bottom:0; opacity:1 }
			}
		</style>

					}
				}
				
				//Hide entire non-loading page
				function hide_page(){
					document.getElementById('entire_page').style.display='none';
				}

				//Define which elements to show and hide
				function showPage() {
			  		document.getElementById('loader').style.display = 'none';
			  		document.getElementById('loader2').style.display = 'none';
			  		document.getElementById('quote').style.display = 'none';
